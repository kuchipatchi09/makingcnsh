<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAKING DEPT. | 멘토 연결 시스템</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        :root {
            --primary: #0A84FF; --bg: #000000; --card: #1C1C1E;
            --text-main: #FFFFFF; --text-sub: #A1A1A6; --border: #38383A;
            /* 분야별 포인트 컬러 */
            --math: #FF3B30; --phys: #FF9F0A; --chem: #FFD60A; 
            --bio: #34C759; --earth: #64D2FF; --info: #5E5CE6; --ipsi: #BF5AF2;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); }

        header { background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(20px); padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
        header h1 { font-size: 1.8rem; letter-spacing: -0.5px; margin-bottom: 8px; }
        header p { color: var(--text-sub); font-size: 0.9rem; }

        nav { 
            display: flex; justify-content: center; gap: 8px; padding: 20px; 
            overflow-x: auto; background: var(--bg); border-bottom: 1px solid var(--border);
        }
        .category-btn {
            padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px;
            background: var(--card); color: var(--text-sub); cursor: pointer; 
            white-space: nowrap; transition: 0.2s; font-size: 0.85rem;
        }
        .category-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px 50px; }
        .mentor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        
        .mentor-card {
            background: var(--card); border-radius: 20px; padding: 25px;
            border: 1px solid var(--border); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        .mentor-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .top-line { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .subject-tag { padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        
        .name { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
        .role { color: var(--primary); font-size: 0.85rem; font-weight: 600; margin-bottom: 15px; }
        .desc { color: var(--text-sub); font-size: 0.9rem; line-height: 1.5; margin-bottom: 20px; flex-grow: 1; }

        .action-area { border-top: 1px solid var(--border); padding-top: 15px; }
        .contact-btn {
            width: 100%; padding: 12px; border: none; border-radius: 12px;
            background: #3A3A3C; color: #fff; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .contact-btn:hover { background: var(--primary); }

        /* 모달 팝업 CSS */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px);
            z-index: 1000; justify-content: center; align-items: center;
        }
        .modal {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 30px; max-width: 350px; width: 90%;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: popIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal h2 { font-size: 1.3rem; margin-bottom: 12px; color: var(--text-main); }
        .modal p { color: var(--text-sub); font-size: 0.9rem; margin-bottom: 25px; line-height: 1.5; word-break: keep-all; }
        .modal-buttons { display: flex; gap: 10px; }
        .btn-cancel {
            flex: 1; padding: 12px; border: none; border-radius: 12px;
            background: #3A3A3C; color: #fff; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-agree {
            flex: 1; padding: 12px; border: none; border-radius: 12px;
            background: var(--primary); color: #fff; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-cancel:hover { background: #505052; }
        .btn-agree:hover { background: #0070D6; }
    </style>
</head>
<body>

<header>
    <h1>MAKING DEPT. MENTORING</h1>
    <p>선배들의 경험과 지식을 공유받으세요.</p>
</header>

<nav id="nav">
    <button class="category-btn active" onclick="filter('all')">전체</button>
    <button class="category-btn" onclick="filter('수학')">수학</button>
    <button class="category-btn" onclick="filter('물리')">물리</button>
    <button class="category-btn" onclick="filter('화학')">화학</button>
    <button class="category-btn" onclick="filter('생명')">생명</button>
    <button class="category-btn" onclick="filter('지구')">지구</button>
    <button class="category-btn" onclick="filter('정보')">정보</button>
    <button class="category-btn" onclick="filter('입시')">입시</button>
</nav>

<div class="container">
    <div class="mentor-grid" id="list"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2>안내 및 동의</h2>
        <p>멘토링 매칭을 위해 연구 목적으로만 활용해주시길 바랍니다.<br>신청 폼으로 이동하시겠습니까?</p>
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn-agree" onclick="goToForm()">동의 후 신청</button>
        </div>
    </div>
</div>

<script>
    const data = [
        // 수학
        { n: "장윤호", s: "수학", r: "31기", d: "사이클로이드 이해 및 R&E 우수상 경험 기반 창의적 수학 탐구 지원" },
        { n: "이현서", s: "수학", r: "31기", d: "수학적 모델링, 수식 간략화, 미분방정식 풀이 및 시각화 도구 활용 지원" },
        { n: "이주호", s: "수학", r: "31기", d: "프로그래밍 기반 시뮬레이션 제작 및 다양한 도구(QGIS, 아두이노 등) 활용 지원" },
        { n: "정상수", s: "수학", r: "31기", d: "레이저 커팅 도안 제작 및 아두이노 회로 구성 가능" },
        // 물리
        { n: "최윤서", s: "물리", r: "31기", d: "광학 기기 사용, 울프람/블렌더/3D프린팅 활용, 논문 작성 및 R&E·전람회 준비 전반 지원" },
        { n: "맹민규", s: "물리", r: "32기", d: "광학 기기 사용 및 데이터 코딩 처리, 보고서 작성과 발표 준비 지원" },
        { n: "우진우", s: "물리", r: "31기", d: "파스코 센서 활용, 3D 모델링 및 논문 구조화 지원" },
        // 화학
        { n: "이주환", s: "화학", r: "31기", d: "AAS·UV-VIS·UTM 등 기기 사용 및 실험 프로토콜, 대회·보고서 작성까지 전반 지원" },
        { n: "이도헌", s: "화학", r: "31기", d: "다양한 분석기기(AAS, HPLC, SEM 등) 및 시뮬레이션 활용, 다수 대회 경험 기반 연구·발표 및 융합 연구 지원" },
        { n: "오지원", s: "화학", r: "32기", d: "AAS 기기 활용 지원" },
        // 생명(생물)
        { n: "성지원", s: "생명", r: "31기", d: "SEM 및 다양한 생명 실험 기기 사용, 배양·추출 등 실험법과 논문 작성 지원" },
        { n: "김지후", s: "생명", r: "32기", d: "전기 관련 실험 기구 조작 및 제작, 아이디어 제공 및 멘토링" },
        // 지구(지구과학)
        { n: "김주혜", s: "지구", r: "31기", d: "천문대 장비 사용, 관측 데이터 분석 및 원격관측, 연구 계획 검토 지원" },
        { n: "이재원", s: "지구", r: "31기", d: "3D 모델링 및 무한상상 활동 지원" },
        { n: "이재형", s: "지구", r: "32기", d: "천체 관측·촬영 및 천체 사진 보정 지원" },
        // 정보
        { n: "유현규", s: "정보", r: "31기", d: "딥러닝, 임베디드(아두이노·라즈베리파이·ESP32), 3D 모델링 지원" },
        { n: "이승현", s: "정보", r: "31기", d: "딥러닝 모델 설계, 데이터 전처리 및 AI 연구 방향 제시" },
        { n: "권원준", s: "정보", r: "32기", d: "데이터 기반 탐구 및 분석 지원" },
        { n: "황석현", s: "정보", r: "32기", d: "연구에 필요한 여러 형태의 웹사이트 제작 지원" },
        // 입시(대입/컨설팅) - 상세 설명이 없는 분들은 기본 멘트로 통일
        { n: "김태욱", s: "입시", r: "KAIST", d: "대입 및 진로 컨설팅, 합격 노하우 및 경험 공유" },
        { n: "박승호", s: "입시", r: "고려대 반도체", d: "대입 및 진로 컨설팅, 합격 노하우 및 경험 공유" },
        { n: "오서현", s: "입시", r: "서울대 화생공", d: "대입 및 진로 컨설팅, 합격 노하우 및 경험 공유" },
        { n: "이현서", s: "입시", r: "서울대 수리과학부", d: "대입 및 진로 컨설팅, 합격 노하우 및 경험 공유" },
        { n: "임하은", s: "입시", r: "KAIST", d: "대입 및 진로 컨설팅, 합격 노하우 및 경험 공유" },
        { n: "유민혁", s: "입시", r: "Postech", d: "대입 및 진로 컨설팅, 합격 노하우 및 경험 공유" },
        { n: "차하준", s: "입시", r: "KAIST", d: "대입 및 진로 컨설팅, 합격 노하우 및 경험 공유" }
    ];

    const colors = { "수학":"var(--math)", "물리":"var(--phys)", "화학":"var(--chem)", "생명":"var(--bio)", "지구":"var(--earth)", "정보":"var(--info)", "입시":"var(--ipsi)" };

    function filter(sub) {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        render(sub);
    }

    function render(sub = 'all') {
        const list = document.getElementById('list');
        list.innerHTML = '';
        data.forEach((m, i) => {
            if (sub !== 'all' && m.s !== sub) return;
            const card = document.createElement('div');
            card.className = 'mentor-card';
            card.innerHTML = `
                <div class="top-line">
                    <span class="subject-tag" style="background:${colors[m.s]}22; color:${colors[m.s]}">${m.s}</span>
                </div>
                <div class="name">${m.n}</div>
                <div class="role">${m.r}</div>
                <div class="desc">${m.d}</div>
                <div class="action-area">
                    <button class="contact-btn" onclick="openModal()">신청하기</button>
                </div>
            `;
            list.appendChild(card);
        });
    }

    // 모달 제어 함수
    const modal = document.getElementById('modalOverlay');
    
    function openModal() {
        modal.style.display = 'flex';
    }

    function closeModal() {
        modal.style.display = 'none';
    }

    function goToForm() {
        // 구글 폼 새 창으로 열기
        window.open('https://forms.gle/ujPqhUxS5cWXBCHM7', '_blank');
        closeModal();
    }

    // 모달 바깥 영역 클릭 시 닫기
    window.onclick = function(event) {
        if (event.target === modal) {
            closeModal();
        }
    }

    render();
</script>

</body>
</html>
